name: Update dividend calendar

on:
  schedule:
    - cron: "20 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dividends:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Daily universe and dividend update
        run: |
          python dividend_calendar_pipeline.py --daily-update --lookback-days 95 --forward-days 550 --workers 8

      - name: Validate database
        run: |
          python - <<'PY'
          import sqlite3
          import csv
          conn = sqlite3.connect("data/dividends.db")
          total = conn.execute("select count(*) from dividend_events").fetchone()[0]
          nasdaq = conn.execute("select count(*) from dividend_events where source='nasdaq_calendar'").fetchone()[0]
          max_date = conn.execute("select max(ex_dividend_date) from dividend_events").fetchone()[0]
          print({"total": total, "nasdaq": nasdaq, "max_date": max_date})
          if nasdaq == 0:
              raise SystemExit("No Nasdaq dividend events were loaded.")
          conn.close()
          with open("data/us_universe.csv", encoding="utf-8", newline="") as fh:
              rows = list(csv.DictReader(fh))
          etfs = [r for r in rows if r.get("asset_type") in ("ETF/Fund", "Note/Bond")]
          print({"universe": len(rows), "fund_like": len(etfs)})
          if len(etfs) < 1000:
              raise SystemExit("ETF/fund universe looks too small.")
          PY

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update dividend calendar data"
          file_pattern: data/dividends.db data/us_universe.csv
